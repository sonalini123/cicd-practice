name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
env:
  APP_NAME: cicd-practice
  PYTHON_VERSION_DEFAULT: '3.11'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    steps:
             - name: Checkout code 
               uses: actions/checkout@v4

             - name: Set up Python
               uses: actions/setup-python@v5
               with:
                python-version: ${{ matrix.python-version }}

             - name: Install dependencies 
               run: pip install -r requirements.txt

             - name: Run Tests
               run: pytest  

             - name: Use Secret
               env:
                 MY_SECRET: ${{ secrets.MY_SECRET }}
               run: echo "the secret is $MY-SECRET"  
               
  build:
     runs-on: ubuntu-latest
     steps:
             - name: Checkout code
               uses: actions/checkout@v4

             - name: Build confirmation
               run: echo "Tests passed! Ready to build Docker Image"
