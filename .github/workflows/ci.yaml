name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  APP_NAME: cicd-practice

jobs:
  call-tests:
    uses: ./.github/workflows/reusable-test.yml
    with:
      python-version: '3.11'

  build:
    runs-on: ubuntu-latest
    needs: call-tests
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build confirmation
        run: echo "Building $APP_NAME!"

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    environment: development
    steps:
      - name: Deploy to dev
        run: echo "Deploying $APP_NAME to development!"

  deploy-staging:
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.event_name == 'push'
    environment: staging
    steps:
      - name: Deploy to staging
        run: echo "Deploying $APP_NAME to staging!"

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push'
    environment: production
    steps:
      - name: Deploy to production
        run: echo "Deploying $APP_NAME to production!"
